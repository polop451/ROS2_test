# 1. เชื่อมต่อเวลาของระบบจำลอง (ผ่านแล้ว ห้ามระเบิด)
- topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS

# 2. เปลี่ยนมาใช้พิกัด /pose_array เพื่อให้จับคู่กับ gz.msgs.Pose_V ได้โดยตรง
- topic_name: /model/simple_manipulator/pose_array
  ros_type_name: geometry_msgs/msg/PoseArray
  gz_type_name: gz.msgs.Pose_V
  direction: GZ_TO_ROS